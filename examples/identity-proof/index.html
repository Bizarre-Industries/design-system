<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bizarre Industries — Identity Proof 001</title>
  <link rel="stylesheet" href="../../packages/tokens/generated/tokens.css">
  <link rel="stylesheet" href="../../packages/assets/generated/fonts/bizarre-fonts.css">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bzr-color-neutral-workshop); color: var(--bzr-color-neutral-paper); font-family: var(--bzr-font-family-body); }
    main { width: min(92rem, 100%); margin: auto; padding: var(--bzr-space-12); }
    .meta, .label { font-family: var(--bzr-font-family-mono); font-size: var(--bzr-font-size-xs); letter-spacing: var(--bzr-font-tracking-xwide); text-transform: uppercase; }
    header { display: flex; justify-content: space-between; gap: var(--bzr-space-6); padding-bottom: var(--bzr-space-5); border-bottom: var(--bzr-border-1) solid var(--bzr-border-default); }
    h1 { margin: var(--bzr-space-12) 0 var(--bzr-space-3); font-family: var(--bzr-font-family-stencil); font-size: var(--bzr-font-size-5xl); text-transform: uppercase; }
    .intro { width: 100%; max-width: 45rem; overflow-wrap: anywhere; color: var(--bzr-content-muted); }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--bzr-space-10); margin-top: var(--bzr-space-12); }
    figure { min-width: 0; margin: 0; }
    figcaption { display: flex; justify-content: space-between; gap: var(--bzr-space-3); margin-bottom: var(--bzr-space-3); color: var(--bzr-content-muted); }
    .poster { min-width: 0; min-height: 44rem; padding: var(--bzr-space-10); display: flex; flex-direction: column; overflow: hidden; border: var(--bzr-border-1) solid var(--bzr-border-default); box-shadow: var(--bzr-shadow-md); }
    .field { justify-content: space-between; background: var(--bzr-color-accent-signal); color: var(--bzr-color-neutral-void); }
    .panel { background: var(--bzr-color-neutral-void); }
    .mark { width: 8rem; height: 8rem; display: block; }
    .slogan { margin: auto 0 0; padding-top: var(--bzr-space-20); font-family: var(--bzr-font-family-display); font-size: clamp(3rem, 7vw, 6.5rem); font-weight: var(--bzr-font-weight-black); line-height: .9; letter-spacing: var(--bzr-font-tracking-tight); }
    .panel h2 { margin: var(--bzr-space-12) 0 var(--bzr-space-6); font-family: var(--bzr-font-family-stencil); font-size: var(--bzr-font-size-5xl); text-transform: uppercase; }
    .spec { display: grid; grid-template-columns: 1fr 1fr; gap: var(--bzr-space-1); border-top: var(--bzr-border-3) solid var(--bzr-color-accent-signal); }
    .spec div { padding: var(--bzr-space-4); background: var(--bzr-surface-card); }
    footer { margin-top: var(--bzr-space-12); padding-top: var(--bzr-space-5); border-top: var(--bzr-border-1) solid var(--bzr-border-default); color: var(--bzr-content-muted); }
    @media (max-width: 48rem) { main { padding: var(--bzr-space-5); overflow: hidden; } header { flex-direction: column; } h1 { font-size: var(--bzr-font-size-2xl); } .intro { max-width: 18rem; font-size: var(--bzr-font-size-sm); } .grid { grid-template-columns: minmax(0, 1fr); } figcaption { align-items: end; padding-right: var(--bzr-space-3); font-size: .55rem; } figcaption span:last-child { text-align: right; } .poster { min-height: 36rem; padding: var(--bzr-space-6); } .slogan { font-size: clamp(3rem, 18vw, 4.5rem); } .panel h2 { max-width: 17rem; overflow-wrap: anywhere; font-size: var(--bzr-font-size-xl); } .spec { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <header class="meta"><span>Identity / Proof / 001</span><span>Offline / Governed</span></header>
    <h1>Bizarre Industries</h1>
    <p class="intro">Two layout vocabularies, one governed identity. Values and type are loaded from the generated packages; marks are approved package assets.</p>
    <section class="grid" aria-label="Identity proof posters">
      <figure>
        <figcaption class="label"><span>Display Field</span><span>MARK · PRIMARY</span></figcaption>
        <article class="poster field">
          <img class="mark" src="../../packages/assets/generated/logo/mark-primary.svg" alt="Bizarre Industries gravity-well mark, primary">
          <div class="slogan">CATCH<br>THE STARS</div>
        </article>
      </figure>
      <figure>
        <figcaption class="label"><span>Precision Panel</span><span>MARK · INVERSE</span></figcaption>
        <article class="poster panel">
          <img class="mark" src="../../packages/assets/generated/logo/mark-inverse.svg" alt="Bizarre Industries gravity-well mark, inverse">
          <h2>Built for the already-wired</h2>
          <div class="spec meta"><div>Package<br>@bizarre/tokens</div><div>Package<br>@bizarre/assets</div><div>Token manifest<br>schema v1</div><div>Asset manifest<br>schema v1</div></div>
        </article>
      </figure>
    </section>
    <footer class="meta">Canonical resources / package-relative / no network required</footer>
  </main>
</body>
</html>
